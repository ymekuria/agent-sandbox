name: Publish to npm
permissions:
  id-token: write
  contents: read
on:
  push:
    branches: [main]
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n bin/agent-sandbox && sh -n install.sh
      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck bin/agent-sandbox install.sh
  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - uses: JS-DevTools/npm-publish@v4
        with:
          token: ${{ secrets.NPM_TOKEN }}
          strategy: upgrade
          provenance: true
          access: public
