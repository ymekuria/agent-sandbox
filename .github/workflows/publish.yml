name: Publish to npm
permissions:
  id-token: write
  contents: read
on:
  push:
    branches: [main]
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n bin/agent-sandbox && sh -n install.sh
      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck bin/agent-sandbox install.sh
